<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Ruleta de Premios — subsidios.cl</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;
  --navy:#17233D;
  --blue:#07658D;
  --gold:#F5C518;
  --gold2:#E0A800;
  --gray:#6b7a8d;
  --gray2:#e8edf3;
  --gray3:#f4f6f9;
  --red:#e53e3e;
  --green:#2d8a4e;
  --r:14px;--rs:9px;
  --shadow:0 2px 16px rgba(23,35,61,0.10);
  --shadow-lg:0 8px 40px rgba(23,35,61,0.14);
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--navy);overflow:hidden;-webkit-font-smoothing:antialiased}

/* subtle dot grid bg */
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(23,35,61,0.06) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;z-index:0}

/* VIEWS */
.view{display:none;position:fixed;inset:0;overflow:hidden;z-index:1;flex-direction:column;background:var(--bg)}
.view.active{display:flex}

/* ══ TOP BAR ══ */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px;flex-shrink:0;position:relative;z-index:10;border-bottom:1.5px solid var(--gray2)}
.topbar-left{display:flex;align-items:center;gap:0}
.topbar-right{display:flex;align-items:center;gap:10px}

/* Logo SVG inline */
.logo-svg-wrap{display:flex;align-items:center}
.logo-svg-wrap svg{height:36px;width:auto}

/* Config icon button */
.cfg-icon-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:10px;border:1.5px solid var(--gray2);background:var(--bg);cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;color:var(--gray)}
.cfg-icon-btn:hover{background:var(--gray3);border-color:#c8d0db;color:var(--navy)}
.cfg-icon-btn svg{width:18px;height:18px;stroke-width:1.8}

/* ══ GAME VIEW ══ */
#game{align-items:center;justify-content:space-between}
.game-inner{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 16px 16px;gap:24px;width:100%}

/* Title block */
.title-block{text-align:center;line-height:1;margin-bottom:4px}
.title-line1{font-family:'Bebas Neue',sans-serif;font-size:clamp(30px,5vw,48px);letter-spacing:3px;color:var(--navy);display:block}
.title-line2{font-family:'DM Sans',sans-serif;font-size:clamp(13px,2vw,17px);font-weight:500;color:var(--blue);letter-spacing:.06em;display:block;margin-top:4px}

/* Wheel frame */
.wframe{position:relative;display:flex;align-items:center;justify-content:center}
.wring{position:absolute;border-radius:50%;pointer-events:none}
.wring1{width:calc(var(--ws) + 20px);height:calc(var(--ws) + 20px);background:conic-gradient(from 0deg,var(--ring-a) 0 20deg,var(--ring-b) 20deg 60deg,var(--ring-a) 60deg 80deg,var(--ring-b) 80deg 120deg,var(--ring-a) 120deg 140deg,var(--ring-b) 140deg 180deg,var(--ring-a) 180deg 200deg,var(--ring-b) 200deg 240deg,var(--ring-a) 240deg 260deg,var(--ring-b) 260deg 300deg,var(--ring-a) 300deg 320deg,var(--ring-b) 320deg 360deg);box-shadow:var(--shadow-lg)}
.wring2{width:calc(var(--ws) + 6px);height:calc(var(--ws) + 6px);background:var(--bg)}
#wcanvas{border-radius:50%;position:relative;z-index:2;display:block;box-shadow:0 4px 24px rgba(23,35,61,0.12)}

/* Pointer */
.ptr{position:absolute;top:-2px;left:50%;transform:translateX(-50%);z-index:10;display:flex;flex-direction:column;align-items:center;filter:drop-shadow(0 2px 8px rgba(23,35,61,0.35))}
.ptr-dot{width:20px;height:20px;background:#fff;border-radius:50%;border:3px solid var(--navy)}
.ptr-tri{width:0;height:0;border-left:9px solid transparent;border-right:9px solid transparent;border-top:22px solid #fff;margin-top:-1px}

/* Hub */
.hub{position:absolute;width:52px;height:52px;border-radius:50%;background:#fff;border:3px solid var(--navy);z-index:10;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(23,35,61,0.18)}
.hub-in{width:24px;height:24px;border-radius:50%;background:var(--navy)}

/* Spin button */
.spinbtn{position:relative;padding:0;width:220px;height:66px;border:none;cursor:pointer;background:transparent;-webkit-tap-highlight-color:transparent;transition:transform .12s;margin-top:8px}
.spinbtn:active:not(:disabled){transform:scale(.97)}
.spinbtn:disabled{opacity:.35;cursor:not-allowed}
.spinbtn-in{width:100%;height:100%;background:var(--navy);border-radius:33px;display:flex;align-items:center;justify-content:center;gap:10px;font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:#fff;box-shadow:0 5px 0 #0a1426,0 8px 24px rgba(23,35,61,0.22);transition:box-shadow .1s,transform .1s;position:relative;overflow:hidden}
.spinbtn-in::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1) 0%,transparent 55%)}
.spinbtn:active:not(:disabled) .spinbtn-in{box-shadow:0 1px 0 #0a1426,0 2px 8px rgba(23,35,61,0.2);transform:translateY(4px)}
.spin-ico{width:20px;height:20px;stroke:#fff;stroke-width:2.5;fill:none}

/* ══ CONFIG DRAWER ══ */
#cfg-overlay{display:none;position:fixed;inset:0;z-index:50}
#cfg-overlay.open{display:block}
.cfg-backdrop{position:absolute;inset:0;background:rgba(23,35,61,0.35);backdrop-filter:blur(3px)}
.cfg-drawer{position:absolute;top:0;right:0;width:min(440px,100vw);height:100%;background:#fff;border-left:1.5px solid var(--gray2);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.32,0,.2,1);box-shadow:-8px 0 40px rgba(23,35,61,0.12)}
#cfg-overlay.open .cfg-drawer{transform:translateX(0)}
.cfg-dh{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1.5px solid var(--gray2);flex-shrink:0}
.cfg-dtitle{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--navy)}
.cfg-close{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:8px;border:1.5px solid var(--gray2);cursor:pointer;color:var(--gray);transition:all .2s;-webkit-tap-highlight-color:transparent;background:#fff}
.cfg-close:hover{background:var(--gray3);color:var(--navy)}
.cfg-close svg{width:15px;height:15px;stroke-width:2.2}
.cfg-body{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px;-webkit-overflow-scrolling:touch}

/* Cards */
.card{background:#fff;border:1.5px solid var(--gray2);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
.clabel{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.clabel svg{width:12px;height:12px;stroke-width:2.5;flex-shrink:0}

/* Slider */
.srow{display:flex;align-items:center;gap:12px}
.srow label{font-size:13px;color:var(--gray);flex:1;font-weight:400}
.srow input[type=range]{flex:2;-webkit-appearance:none;height:4px;background:var(--gray2);border-radius:2px;outline:none}
.srow input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--navy);cursor:pointer;box-shadow:0 1px 4px rgba(23,35,61,0.3)}
.sval{font-family:'Space Mono',monospace;font-size:17px;color:var(--navy);min-width:26px;text-align:right;font-weight:700}

/* Color palette row */
.color-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-top:4px}
.color-swatch{width:100%;aspect-ratio:1;border-radius:8px;cursor:pointer;border:2.5px solid transparent;transition:transform .15s,border-color .15s;position:relative}
.color-swatch.selected{border-color:var(--navy);transform:scale(1.12)}
.color-swatch:hover{transform:scale(1.08)}
.color-swatch-label{font-size:9px;text-align:center;color:var(--gray);margin-top:3px;font-weight:500}

/* Ring color pickers */
.ring-colors{display:flex;gap:12px;align-items:center;margin-top:4px}
.ring-col-item{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.ring-col-item label{font-size:10px;color:var(--gray);font-weight:500}
.ring-col-preview{width:100%;height:28px;border-radius:7px;border:1.5px solid var(--gray2);cursor:pointer;position:relative;overflow:hidden}
.ring-col-preview input[type=color]{position:absolute;inset:-4px;width:calc(100% + 8px);height:calc(100% + 8px);opacity:0;cursor:pointer}

/* Segments table */
.stbl{width:100%;border-collapse:collapse}
.stbl th{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--gray);padding:0 5px 8px;text-align:left}
.stbl th.tc{text-align:center}
.srow2 td{padding:4px 5px;vertical-align:middle}
.srow2:not(:last-child) td{border-bottom:1.5px solid var(--gray3)}
.cpill{width:10px;height:28px;border-radius:5px}
.sinput{width:100%;background:var(--gray3);border:1.5px solid transparent;border-radius:7px;color:var(--navy);font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 8px;transition:border-color .2s,background .2s;-webkit-tap-highlight-color:transparent}
.sinput:focus{outline:none;border-color:var(--blue);background:#fff}
.sinput::placeholder{color:#aab}
.sinput-n{width:48px;background:var(--gray3);border:1.5px solid transparent;border-radius:7px;color:var(--navy);font-family:'Space Mono',monospace;font-size:11px;padding:6px 4px;text-align:center;transition:border-color .2s,background .2s;font-weight:700}
.sinput-n:focus{outline:none;border-color:var(--blue);background:#fff}
.img-cell{position:relative;width:40px;height:34px;flex-shrink:0}
.img-preview{width:40px;height:34px;border-radius:6px;object-fit:cover;border:1.5px solid var(--gray2);display:block;cursor:pointer}
.img-placeholder{width:40px;height:34px;border-radius:6px;border:1.5px dashed var(--gray2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .2s,background .2s;background:var(--gray3)}
.img-placeholder:hover{border-color:var(--blue);background:#eaf4f9}
.img-placeholder svg{width:13px;height:13px;stroke:var(--gray);stroke-width:2}
.chk{width:20px;height:20px;-webkit-appearance:none;border:2px solid var(--gray2);border-radius:5px;background:#fff;cursor:pointer;transition:all .18s;position:relative;display:block;margin:0 auto}
.chk:checked{background:var(--navy);border-color:var(--navy)}
.chk:checked::after{content:'';position:absolute;left:5px;top:2px;width:7px;height:11px;border:2px solid #fff;border-top:0;border-left:0;transform:rotate(45deg)}

/* Prob bar */
.probrow{display:flex;align-items:center;gap:10px;margin-top:10px;padding-top:10px;border-top:1.5px solid var(--gray3)}
.probbar-wrap{flex:1;height:4px;background:var(--gray2);border-radius:2px;overflow:hidden}
.probbar{height:100%;border-radius:2px;transition:width .3s,background .3s}
.problbl{font-family:'Space Mono',monospace;font-size:11px;min-width:42px;text-align:right;font-weight:700}

/* Footer */
.cfg-footer{padding:14px 18px;border-top:1.5px solid var(--gray2);flex-shrink:0;display:flex;flex-direction:column;gap:7px;background:#fff}
.savebtn{width:100%;padding:13px;background:var(--navy);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1.5px;border:none;border-radius:var(--rs);cursor:pointer;transition:background .15s,transform .1s;box-shadow:0 3px 0 #0a1426}
.savebtn:active{transform:scale(.98);background:#0f1e38}
.save-status{font-size:11px;text-align:center;min-height:14px;color:var(--gray);font-weight:500}
.save-status.ok{color:var(--green)}
.save-status.err{color:var(--red)}

/* ══ RESULT OVERLAY ══ */
#result{display:none;position:fixed;inset:0;z-index:200;align-items:center;justify-content:center;padding:20px}
#result.show{display:flex}
.rbg{position:absolute;inset:0;background:rgba(23,35,61,0.65);backdrop-filter:blur(10px)}
.rcard{position:relative;z-index:1;width:100%;max-width:340px;background:#fff;border:2px solid var(--gray2);border-radius:24px;padding:28px 22px 22px;text-align:center;animation:rIn .4s cubic-bezier(.34,1.56,.64,1);box-shadow:var(--shadow-lg)}
.rcard.siga{border-color:var(--gray2)}
.rcard.win{border-color:var(--navy)}
@keyframes rIn{from{transform:scale(.7) translateY(30px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.rimg-wrap{width:100px;height:100px;border-radius:16px;overflow:hidden;margin:0 auto 14px;border:2px solid var(--gray2);background:var(--gray3)}
.rimg-wrap img{width:100%;height:100%;object-fit:cover}
.rburst{font-size:52px;line-height:1;margin-bottom:10px;animation:burst .5s .15s both}
@keyframes burst{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.reye{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--blue);margin-bottom:5px}
.reye.se{color:var(--gray)}
.rprize{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:1px;color:var(--navy);line-height:1.15;margin-bottom:22px}
.rprize.st{font-size:24px;color:var(--gray)}
.rdiv{height:1.5px;background:var(--gray2);margin-bottom:16px}
.rbtn-again{width:100%;padding:14px;background:var(--navy);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1.5px;border:none;border-radius:11px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .1s,background .15s;box-shadow:0 3px 0 #0a1426}
.rbtn-again:active{transform:scale(.98)}

/* confetti */
.cfp{position:fixed;pointer-events:none;z-index:300;border-radius:2px;animation:cfFall linear forwards}
@keyframes cfFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* loading */
#loading-screen{position:fixed;inset:0;z-index:500;background:#fff;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;transition:opacity .4s}
#loading-screen.hidden{opacity:0;pointer-events:none}
.spin-loader{width:26px;height:26px;border:3px solid var(--gray2);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gray2);border-radius:2px}

@media(min-width:600px){
  .title-line1{font-size:46px}
  .spinbtn{width:220px;height:62px}
  .spinbtn-in{font-size:24px}
}
</style>
</head>

    // Mini preview: 4 colors
    preview.style.background=`linear-gradient(135deg, ${p.colors[0]} 25%, ${p.colors[1]} 25% 50%, ${p.colors[2]} 50% 75%, ${p.colors[3]} 75%)`;
    preview.onclick=()=>{activePalette=i;applyPalette();renderPaletteUI();};
    const lbl=document.createElement('div');
    lbl.className='color-swatch-label';
    lbl.textContent=p.name;
    wrap.appendChild(preview);wrap.appendChild(lbl);
    grid.appendChild(wrap);
  });
}

function applyPalette(){
  segments.forEach((s,i)=>{
    if(!s.isSiga) s.color=PALETTES[activePalette].colors[i%PALETTES[activePalette].colors.length];
  });
  renderTable();
  drawWheel();
}

// ═══ SUPABASE HELPERS ═══
async function sbGet(t){const r=await fetch(SB_URL+'/rest/v1/'+t+'?select=*&limit=1',{headers:{...HDRS,'Range':'0-0'}});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbUpdate(t,id,d){const r=await fetch(SB_URL+'/rest/v1/'+t+'?id=eq.'+id,{method:'PATCH',headers:{...HDRS,'Prefer':'return=representation'},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbInsert(t,d){const r=await fetch(SB_URL+'/rest/v1/'+t,{method:'POST',headers:{...HDRS,'Prefer':'return=representation'},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json();}
async function uploadImage(file,name){
  const ext=file.name.split('.').pop();
  const fname=name+'_'+Date.now()+'.'+ext;
  const r=await fetch(SB_URL+'/storage/v1/object/premios/'+fname,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':file.type,'x-upsert':'true'},body:file});
  if(!r.ok)throw new Error(await r.text());
  return STORAGE_URL+fname;
}

// ═══ LOAD CONFIG ═══
async function loadConfig(){
  const dot=document.getElementById('conn-dot');
  try{
    const rows=await sbGet('ruleta_config');
    if(rows&&rows.length>0){
      const row=rows[0];configId=row.id;
      if(row.segments&&row.segments.length>0){
        segments=row.segments;
        if(row.palette_index!=null)activePalette=row.palette_index;
        if(row.ring_a)document.getElementById('ring-a-color').value=row.ring_a;
        if(row.ring_b)document.getElementById('ring-b-color').value=row.ring_b;
        updateRingColors();
        const n=segments.length;
        document.getElementById('num-slots').value=n;
        document.getElementById('slots-display').textContent=n;
        renderTable();renderPaletteUI();
        dot.textContent='● En línea';dot.style.color='var(--green)';
        setTimeout(()=>{dot.textContent='';},4000);
        return;
      }
    }
    segments=defaultSegments(8);renderTable();renderPaletteUI();
  }catch(e){
    segments=defaultSegments(8);renderTable();renderPaletteUI();
    dot.textContent='Sin conexión';dot.style.color='var(--red)';
  }
}

// ═══ SAVE CONFIG ═══
async function saveConfig(){
  const btn=document.querySelector('.savebtn');
  const st=document.getElementById('save-status');
  btn.disabled=true;st.textContent='Guardando...';st.className='save-status';
  try{
    const toSave=segments.map(s=>({label:s.label,isSiga:s.isSiga,prob:s.prob,color:s.color,imgUrl:s.imgUrl||null}));
    const ringA=document.getElementById('ring-a-color').value;
    const ringB=document.getElementById('ring-b-color').value;
    const payload={segments:toSave,palette_index:activePalette,ring_a:ringA,ring_b:ringB,updated_at:new Date().toISOString()};
    if(configId){await sbUpdate('ruleta_config',configId,payload);}
    else{const rows=await sbInsert('ruleta_config',payload);if(rows&&rows[0])configId=rows[0].id;}
    st.textContent='✓ Guardado correctamente';st.className='save-status ok';
    drawWheel();
  }catch(e){st.textContent='Error: '+e.message;st.className='save-status err';}
  finally{btn.disabled=false;setTimeout(()=>{st.textContent='';},4000);}
}

// ═══ SEGMENTS ═══
function defaultSegments(n){
  const defs=[
    {label:'🏠 Tour departamento',isSiga:false},{label:'☕ Café gratis',isSiga:false},
    {label:'🎁 Bolsa de regalo',isSiga:false},{label:'Siga participando',isSiga:true},
    {label:'🛍 Merchandising',isSiga:false},{label:'📋 Asesoría gratis',isSiga:false},
    {label:'Siga participando',isSiga:true},{label:'🏆 Premio mayor',isSiga:false},
    {label:'🎟 Sorteo especial',isSiga:false},{label:'Siga participando',isSiga:true},
    {label:'📱 Consulta online',isSiga:false},{label:'🍰 Postre gratis',isSiga:false},
  ];
  const base=Math.floor(100/n),extra=100-base*n;
  const pal=PALETTES[activePalette].colors;
  return Array.from({length:n},(_,i)=>({
    label:defs[i%defs.length].label,isSiga:defs[i%defs.length].isSiga,
    prob:base+(i===0?extra:0),
    color:defs[i%defs.length].isSiga?SIGA_COL:pal[i%pal.length],
    imgUrl:null
  }));
}

function onSlotsChange(){
  const n=+document.getElementById('num-slots').value;
  document.getElementById('slots-display').textContent=n;
  segments=defaultSegments(n);renderTable();
}

function renderTable(){
  const tbody=document.getElementById('seg-body');tbody.innerHTML='';
  segments.forEach((seg,i)=>{
    const hasImg=seg.imgUrl&&seg.imgUrl.length>0;
    const tr=document.createElement('tr');tr.className='srow2';
    tr.innerHTML=`
      <td><div class="cpill" style="background:${seg.color}"></div></td>
      <td><div class="img-cell">
        ${hasImg
          ?`<img class="img-preview" src="${seg.imgUrl}" alt="" onclick="document.getElementById('fup-${i}').click()"/>`
          :`<div class="img-placeholder" onclick="document.getElementById('fup-${i}').click()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>`}
        <input type="file" id="fup-${i}" accept="image/*" style="display:none" onchange="handleImg(${i},this)"/>
      </div></td>
      <td><input class="sinput" type="text" value="${seg.label.replace(/"/g,'&quot;')}" oninput="segments[${i}].label=this.value" placeholder="Premio..."/></td>
      <td><input class="sinput-n" type="number" value="${seg.prob}" min="0" max="100" oninput="segments[${i}].prob=parseInt(this.value)||0;updateProbBar()"/></td>
      <td><input type="checkbox" class="chk" ${seg.isSiga?'checked':''} onchange="toggleSiga(${i},this.checked)"/></td>
    `;
    tbody.appendChild(tr);
  });
  updateProbBar();
}

async function handleImg(idx,input){
  const file=input.files[0];if(!file)return;
  const st=document.getElementById('save-status');
  st.textContent='Subiendo imagen...';st.className='save-status';
  try{
    const url=await uploadImage(file,'premio_'+idx);
    segments[idx].imgUrl=url;renderTable();
    st.textContent='✓ Imagen subida';st.className='save-status ok';
    setTimeout(()=>{st.textContent='';},3000);
  }catch(e){st.textContent='Error al subir imagen';st.className='save-status err';}
}

function toggleSiga(i,checked){
  segments[i].isSiga=checked;
  segments[i].color=checked?SIGA_COL:PALETTES[activePalette].colors[i%PALETTES[activePalette].colors.length];
  const pill=document.querySelector(`#seg-body tr:nth-child(${i+1}) .cpill`);
  if(pill)pill.style.background=segments[i].color;
}

function updateProbBar(){
  const total=segments.reduce((s,x)=>s+x.prob,0);
  const bar=document.getElementById('probbar'),lbl=document.getElementById('problbl');
  bar.style.width=Math.min(total,100)+'%';
  const c=total===100?'var(--green)':total>100?'var(--red)':'var(--gold)';
  bar.style.background=c;lbl.textContent=total+'%';lbl.style.color=c;
}

// ═══ DRAWER ═══
function openConfig(){
  const ov=document.getElementById('cfg-overlay');
  ov.style.display='block';void ov.offsetWidth;ov.classList.add('open');
}
function closeConfig(){

// ═══ WHEEL ═══
function calcWheelSize(){
  const vw=window.innerWidth,vh=window.innerHeight;
  wheelSize=Math.max(Math.min(vw-40,vh-230,480),220);
}

function loadImg(url){
  if(imgCache[url])return Promise.resolve(imgCache[url]);
  return new Promise(res=>{const img=new Image();img.crossOrigin='anonymous';img.onload=()=>{imgCache[url]=img;res(img)};img.onerror=()=>res(null);img.src=url;});
}

async function drawWheel(){
  const canvas=document.getElementById('wcanvas');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const sz=wheelSize;canvas.width=sz;canvas.height=sz;
  const cx=sz/2,cy=sz/2,r=cx-2;
  ctx.clearRect(0,0,sz,sz);
  const total=segments.reduce((s,x)=>s+x.prob,0)||1;
  const n=segments.length;
  let angle=currentAngle-Math.PI/2;
  const imgs=await Promise.all(segments.map(s=>s.imgUrl?loadImg(s.imgUrl):Promise.resolve(null)));

  segments.forEach((seg,i)=>{
    const slice=(seg.prob/total)*2*Math.PI;
    const sliceDeg=(seg.prob/total)*360;

    // Fill
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,angle,angle+slice);ctx.closePath();
    ctx.fillStyle=seg.color;
    ctx.globalAlpha=i%2===1?0.88:1;ctx.fill();ctx.globalAlpha=1;

    // Separator
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(angle)*r,cy+Math.sin(angle)*r);
    ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1.5;ctx.stroke();

    // Content
    ctx.save();ctx.translate(cx,cy);ctx.rotate(angle+slice/2);
    const img=imgs[i];
    const hasImg=img&&!seg.isSiga&&sliceDeg>=22;

    // Draw image thumbnail near outer edge
    if(hasImg){
      const iSz=Math.min(sliceDeg<35?12:sliceDeg<50?16:19,19);
      const iX=r*0.76;
      ctx.save();ctx.beginPath();ctx.arc(iX,0,iSz,0,2*Math.PI);ctx.clip();
      ctx.drawImage(img,iX-iSz,-iSz,iSz*2,iSz*2);ctx.restore();
    }

    // Text — always drawn, centered in the slice
    ctx.rotate(Math.PI/2);
    ctx.shadowColor='rgba(0,0,0,0.4)';ctx.shadowBlur=3;
    ctx.fillStyle=seg.isSiga?'rgba(255,255,255,0.65)':'#fff';

    // Font size: adaptive to segment count and slice size
    let fs=n<=6?13:n<=8?12:n<=10?10:8;
    if(sliceDeg<30) fs=Math.max(fs-1,7);
    if(sliceDeg<20) fs=Math.max(fs-1,6);
    ctx.font=`700 ${fs}px 'DM Sans',sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';

    // Parse emoji and text separately
    const emojiRx=/\p{Emoji_Presentation}|\p{Extended_Pictographic}/gu;
    const raw=seg.label.replace(emojiRx,'').trim();
    const emoji=(seg.label.match(emojiRx)||[])[0]||'';
    const textToDraw=raw||seg.label;

    // Word wrap into max 2 lines
    const words=textToDraw.split(' ').filter(Boolean);
    const half=Math.ceil(words.length/2);
    let lines=words.length<=1?[textToDraw]:[words.slice(0,half).join(' '),words.slice(half).join(' ')].filter(Boolean);

    // Truncate lines that exceed slice width
    const maxTxtW=r*(sliceDeg<28?0.32:sliceDeg<40?0.38:0.44);
    lines=lines.map(l=>{
      let s=l;
      while(s.length>2&&ctx.measureText(s).width>maxTxtW) s=s.slice(0,-1);
      return s!==l?s+'…':s;
    });

    const lh=fs*1.35;
    const showEmoji=emoji&&!seg.isSiga&&!hasImg&&sliceDeg>=30;

    if(showEmoji){
      // Emoji on top + text below, all centered together
      const eSz=fs+3;
      const totalBlock=eSz+2+lines.length*lh;
      let y=-totalBlock/2;
      ctx.font=`${eSz}px serif`;
      ctx.fillText(emoji,0,y+eSz/2);
      y+=eSz+3;
      ctx.font=`700 ${fs}px 'DM Sans',sans-serif`;
      lines.forEach(l=>{ctx.fillText(l,0,y+lh/2);y+=lh;});
    } else {
      // Text only — perfectly centered in slice (no offset)
      const totalH=lines.length*lh;
      let y=-totalH/2;
      lines.forEach(l=>{ctx.fillText(l,0,y+lh/2);y+=lh;});
    }

    ctx.shadowBlur=0;ctx.restore();
    angle+=slice;
  });

  // Center mask
  ctx.beginPath();ctx.arc(cx,cy,29,0,2*Math.PI);ctx.fillStyle='#fff';ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,27,0,2*Math.PI);ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--navy').trim()||'#17233D';ctx.lineWidth=3;ctx.stroke();
}

// ═══ SPIN ═══
function spinWheel(){
  if(isSpinning)return;
  isSpinning=true;document.getElementById('spinbtn').disabled=true;
  const total=segments.reduce((s,x)=>s+x.prob,0)||1;

  // Weighted random winner
  let rand=Math.random()*total,winIdx=0,cum=0;
  for(let i=0;i<segments.length;i++){cum+=segments[i].prob;if(rand<cum){winIdx=i;break;}}

  const slices=segments.map(s=>(s.prob/total)*2*Math.PI);

  // Calculate start angle of winning slice
  let sliceStart=0;
  for(let i=0;i<winIdx;i++) sliceStart+=slices[i];
  const sliceSize=slices[winIdx];

  // Land anywhere inside the slice EXCEPT near the borders (20% buffer each side)
  // This guarantees the pointer is clearly inside the winner — never on an edge
  const buffer=sliceSize*0.20;
  const landOffset=buffer + Math.random()*(sliceSize - buffer*2);
  const landAngle=sliceStart + landOffset;

  // Pointer is at -PI/2 (top). We need: currentAngle + landAngle = -PI/2 (mod 2PI)
  const pointerAt=-Math.PI/2;
  const desired=pointerAt - landAngle;
  const fullSpins=(7+Math.floor(Math.random()*4))*2*Math.PI; // 7-10 full spins for suspense
  const diff=((desired-currentAngle)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
  const target=currentAngle+fullSpins+diff;

  // Longer duration for more suspense
  const dur=5000+Math.random()*2000;
  const t0=performance.now(),a0=currentAngle;

  // Ease: fast start, slow dramatic ending
  function ease(t){
    // Quartic ease-out with a slight hesitation near the end
    if(t<0.7) return t/0.7*0.85; // fast phase
    const t2=(t-0.7)/0.3;
    return 0.85 + 0.15*(1-Math.pow(1-t2,4)); // slow dramatic landing
  }

  function tick(now){
    const p=Math.min((now-t0)/dur,1);
    currentAngle=a0+(target-a0)*ease(p);
    drawWheel();
    if(p<1){requestAnimationFrame(tick);}
    else{
      currentAngle=target;drawWheel();
      isSpinning=false;document.getElementById('spinbtn').disabled=false;
      setTimeout(()=>showResult(winIdx),400);
    }
  }
  requestAnimationFrame(tick);
}

// ═══ RESULT ═══
function showResult(idx){
  const seg=segments[idx];
  const card=document.getElementById('rcard');
  const imgWrap=document.getElementById('rimg-wrap');
  if(seg.imgUrl&&!seg.isSiga){imgWrap.className='rimg-wrap';imgWrap.innerHTML=`<img src="${seg.imgUrl}" alt="${seg.label}"/>`;imgWrap.style.display='block';}
  else{imgWrap.style.display='none';}
  if(seg.isSiga){
    document.getElementById('rburst').textContent='😊';
    document.getElementById('reye').textContent='Esta vez no fue';document.getElementById('reye').className='reye se';
    document.getElementById('rprize').textContent='SIGA PARTICIPANDO';document.getElementById('rprize').className='rprize st';
    card.className='rcard siga';
  }else{
    document.getElementById('rburst').textContent='🎉';
    document.getElementById('reye').textContent='¡Felicitaciones! Ganaste:';document.getElementById('reye').className='reye';
    document.getElementById('rprize').textContent=seg.label;document.getElementById('rprize').className='rprize';
    card.className='rcard win';launchConfetti();
  }
  const ov=document.getElementById('result');ov.style.display='flex';void ov.offsetWidth;ov.classList.add('show');
}
function closeResult(){const ov=document.getElementById('result');ov.style.display='none';ov.classList.remove('show');}

function launchConfetti(){
  const cols=['#17233D','#07658D','#e74c3c','#2ecc71','#f39c12','#9b59b6'];
  for(let i=0;i<70;i++){
    const el=document.createElement('div');el.className='cfp';
    el.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${cols[Math.floor(Math.random()*cols.length)]};width:${5+Math.random()*8}px;height:${5+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.6}s;`;
    document.body.appendChild(el);el.addEventListener('animationend',()=>el.remove());
  }
}

window.addEventListener('resize',()=>{
  calcWheelSize();
  document.getElementById('wframe').style.setProperty('--ws',wheelSize+'px');
  drawWheel();
});

// ═══ BOOT ═══
async function boot(){
  // Set default ring colors
  document.documentElement.style.setProperty('--ring-a','#17233D');
  document.documentElement.style.setProperty('--ring-b','#07658D');
  calcWheelSize();
  document.getElementById('wframe').style.setProperty('--ws',wheelSize+'px');
  await loadConfig();
  await drawWheel();
  document.getElementById('game').classList.add('active');
  const ls=document.getElementById('loading-screen');
  ls.classList.add('hidden');setTimeout(()=>ls.remove(),500);
}
boot();
