<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Ruleta de Premios — subsidios.cl</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#08172e;--navy2:#0f2240;--navy3:#162e52;
  --blue:#1a4f8a;--blue2:#2563b0;
  --gold:#f5c518;--gold2:#e0a800;
  --white:#ffffff;--gray:#7a8fa8;--gray2:#b0c0d4;
  --siga:#2d3f58;--red:#e53e3e;--green:#38a169;
  --r:14px;--rs:8px;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--white);overflow:hidden;-webkit-font-smoothing:antialiased}

.bg-layer{position:fixed;inset:0;pointer-events:none;z-index:0}
.bg-grid{background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:40px 40px}
.bg-orb1{background:radial-gradient(ellipse 600px 400px at 85% -10%,rgba(26,79,138,0.4) 0%,transparent 70%)}
.bg-orb2{background:radial-gradient(ellipse 500px 400px at -10% 90%,rgba(245,197,24,0.07) 0%,transparent 70%)}

/* VIEWS */
.view{display:none;position:fixed;inset:0;overflow:hidden;z-index:1;flex-direction:column}
.view.active{display:flex}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;flex-shrink:0;position:relative;z-index:10;border-bottom:1px solid rgba(255,255,255,0.05)}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-badge{background:linear-gradient(135deg,var(--blue) 0%,var(--blue2) 100%);border:1px solid rgba(245,197,24,0.35);border-radius:10px;padding:7px 13px}
.logo-mark{font-weight:600;font-size:16px;color:#fff;letter-spacing:-.3px}
.logo-mark em{color:var(--gold);font-style:normal}
.logo-sub{font-size:9px;color:var(--gray);letter-spacing:.1em;text-transform:uppercase;margin-top:1px}
.hbtn{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--gray2);border-radius:var(--rs);padding:9px 15px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.hbtn:hover{background:rgba(255,255,255,0.09);color:#fff}
.hbtn svg{width:15px;height:15px;flex-shrink:0}

/* ══ GAME VIEW (PRINCIPAL) ══ */
#game{background:var(--navy);align-items:center;justify-content:space-between}
.wheel-section{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 16px;gap:24px;width:100%}
.wframe{position:relative;display:flex;align-items:center;justify-content:center}
.wring{position:absolute;border-radius:50%;pointer-events:none}
.wring1{width:calc(var(--ws) + 24px);height:calc(var(--ws) + 24px);background:conic-gradient(from 0deg,var(--gold) 0 22.5deg,var(--navy2) 22.5deg 67.5deg,var(--gold) 67.5deg 90deg,var(--navy2) 90deg 135deg,var(--gold) 135deg 157.5deg,var(--navy2) 157.5deg 202.5deg,var(--gold) 202.5deg 225deg,var(--navy2) 225deg 270deg,var(--gold) 270deg 292.5deg,var(--navy2) 292.5deg 337.5deg,var(--gold) 337.5deg 360deg);box-shadow:0 0 32px rgba(245,197,24,.22),inset 0 0 16px rgba(245,197,24,.08)}
.wring2{width:calc(var(--ws) + 8px);height:calc(var(--ws) + 8px);background:var(--navy)}
#wcanvas{border-radius:50%;position:relative;z-index:2;display:block}
.ptr{position:absolute;top:-2px;left:50%;transform:translateX(-50%);z-index:10;display:flex;flex-direction:column;align-items:center}
.ptr-dot{width:20px;height:20px;background:var(--gold);border-radius:50%;box-shadow:0 0 14px rgba(245,197,24,.7);border:2.5px solid var(--navy)}
.ptr-tri{width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:18px solid var(--gold);filter:drop-shadow(0 3px 6px rgba(245,197,24,.4));margin-top:-1px}
.hub{position:absolute;width:56px;height:56px;border-radius:50%;background:var(--navy);border:3.5px solid var(--gold);z-index:10;display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px rgba(245,197,24,.25)}
.hub-in{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 100%)}

.spinbtn{position:relative;padding:0;width:190px;height:60px;border:none;cursor:pointer;background:transparent;-webkit-tap-highlight-color:transparent;transition:transform .1s}
.spinbtn:active:not(:disabled){transform:scale(.97)}
.spinbtn:disabled{opacity:.4;cursor:not-allowed}
.spinbtn-in{width:100%;height:100%;background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 100%);border-radius:30px;display:flex;align-items:center;justify-content:center;gap:9px;font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--navy);box-shadow:0 5px 0 #a07800,0 7px 20px rgba(245,197,24,.38);transition:box-shadow .1s,transform .1s;position:relative;overflow:hidden}
.spinbtn-in::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.22) 0%,transparent 50%)}
.spinbtn:active:not(:disabled) .spinbtn-in{box-shadow:0 2px 0 #a07800,0 3px 10px rgba(245,197,24,.3);transform:translateY(3px)}
.spin-ico{width:20px;height:20px;stroke:var(--navy);stroke-width:2.5;fill:none}

/* ══ CONFIG DRAWER (panel lateral) ══ */
#cfg-overlay{display:none;position:fixed;inset:0;z-index:50}
#cfg-overlay.open{display:block}
.cfg-backdrop{position:absolute;inset:0;background:rgba(8,23,46,0.7);backdrop-filter:blur(4px)}
.cfg-drawer{position:absolute;top:0;right:0;width:min(420px,100vw);height:100%;background:var(--navy2);border-left:1px solid rgba(255,255,255,0.07);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .32s cubic-bezier(.32,0,.2,1);overflow:hidden}
#cfg-overlay.open .cfg-drawer{transform:translateX(0)}
.cfg-drawer-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0}
.cfg-drawer-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--white)}
.cfg-close{display:flex;align-items:center;justify-content:center;width:36px;height:36px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;cursor:pointer;color:var(--gray2);transition:all .2s;-webkit-tap-highlight-color:transparent}
.cfg-close:hover{background:rgba(255,255,255,0.1);color:#fff}
.cfg-close svg{width:16px;height:16px}
.cfg-body{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;-webkit-overflow-scrolling:touch}

.card{background:rgba(255,255,255,0.035);border:1px solid rgba(255,255,255,0.07);border-radius:var(--r);padding:16px}
.clabel{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.clabel svg{width:13px;height:13px;opacity:.85;flex-shrink:0}

.srow{display:flex;align-items:center;gap:12px}
.srow label{font-size:13px;color:var(--gray2);flex:1}
.srow input[type=range]{flex:2;-webkit-appearance:none;height:3px;background:rgba(255,255,255,0.12);border-radius:2px;outline:none}
.srow input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--gold);cursor:pointer;box-shadow:0 0 10px rgba(245,197,24,.5)}
.sval{font-family:'Space Mono',monospace;font-size:18px;color:var(--gold);min-width:28px;text-align:right}

.stbl{width:100%;border-collapse:collapse}
.stbl th{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--gray);padding:0 5px 8px;text-align:left}
.stbl th.tc{text-align:center}
.srow2 td{padding:4px 5px;vertical-align:middle}
.srow2:not(:last-child) td{border-bottom:1px solid rgba(255,255,255,0.04)}
.cpill{width:10px;height:28px;border-radius:5px}
.sinput{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:7px;color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;padding:6px 8px;transition:border-color .2s;-webkit-tap-highlight-color:transparent}
.sinput:focus{outline:none;border-color:var(--gold);background:rgba(255,255,255,0.08)}
.sinput::placeholder{color:var(--gray)}
.sinput-n{width:50px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:7px;color:var(--gold);font-family:'Space Mono',monospace;font-size:12px;padding:6px 4px;text-align:center;transition:border-color .2s}
.sinput-n:focus{outline:none;border-color:var(--gold)}

.img-cell{position:relative;width:42px;height:34px;flex-shrink:0}
.img-preview{width:42px;height:34px;border-radius:6px;object-fit:cover;border:1px solid rgba(255,255,255,0.12);display:block;cursor:pointer}
.img-placeholder{width:42px;height:34px;border-radius:6px;border:1px dashed rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .2s;background:rgba(255,255,255,0.03)}
.img-placeholder:hover{border-color:var(--gold)}
.img-placeholder svg{width:13px;height:13px;stroke:var(--gray);stroke-width:2}

.chk{width:20px;height:20px;-webkit-appearance:none;border:1.5px solid rgba(255,255,255,0.18);border-radius:5px;background:transparent;cursor:pointer;transition:all .2s;position:relative;display:block;margin:0 auto}
.chk:checked{background:var(--gold);border-color:var(--gold)}
.chk:checked::after{content:'';position:absolute;left:5px;top:2px;width:7px;height:11px;border:2px solid var(--navy);border-top:0;border-left:0;transform:rotate(45deg)}

.probrow{display:flex;align-items:center;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.05)}
.probbar-wrap{flex:1;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.probbar{height:100%;border-radius:2px;transition:width .3s,background .3s}
.problbl{font-family:'Space Mono',monospace;font-size:11px;min-width:44px;text-align:right}

.cfg-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.06);flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.savebtn{width:100%;padding:13px;background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 100%);color:var(--navy);font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1.5px;border:none;border-radius:var(--rs);cursor:pointer;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;transition:transform .1s}
.savebtn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 55%)}
.savebtn:active{transform:scale(.98)}
.save-status{font-size:11px;text-align:center;min-height:14px;color:var(--gray)}
.save-status.ok{color:var(--green)}
.save-status.err{color:var(--red)}

/* ══ RESULT OVERLAY ══ */
#result{display:none;position:fixed;inset:0;z-index:200;align-items:center;justify-content:center;padding:20px}
#result.show{display:flex}
.rbg{position:absolute;inset:0;background:rgba(8,23,46,.93);backdrop-filter:blur(14px)}
.rcard{position:relative;z-index:1;width:100%;max-width:360px;background:var(--navy2);border:1px solid rgba(245,197,24,.2);border-radius:22px;padding:30px 22px 22px;text-align:center;animation:rIn .4s cubic-bezier(.34,1.56,.64,1)}
.rcard.siga{border-color:rgba(255,255,255,.08)}
@keyframes rIn{from{transform:scale(.7) translateY(30px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.rimg-wrap{width:96px;height:96px;border-radius:16px;overflow:hidden;margin:0 auto 14px;border:2px solid rgba(245,197,24,.3);background:var(--navy3)}
.rimg-wrap img{width:100%;height:100%;object-fit:cover}
.rburst{font-size:50px;line-height:1;margin-bottom:10px;animation:burst .5s .2s both}
@keyframes burst{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.reye{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:5px}
.reye.se{color:var(--gray)}
.rprize{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px;color:#fff;line-height:1.1;margin-bottom:22px}
.rprize.st{font-size:26px;color:var(--gray2)}
.rdiv{height:1px;background:rgba(255,255,255,.07);margin-bottom:16px}
.racts{display:flex;flex-direction:column;gap:8px}
.rbtn-again{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 100%);color:var(--navy);font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1.5px;border:none;border-radius:11px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .1s}
.rbtn-again:active{transform:scale(.98)}
.rbtn-cfg{width:100%;padding:11px;background:transparent;color:var(--gray);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;border:1px solid rgba(255,255,255,.09);border-radius:11px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:border-color .2s,color .2s}
.rbtn-cfg:hover{border-color:rgba(255,255,255,.18);color:#fff}

/* confetti */
.cfp{position:fixed;pointer-events:none;z-index:300;border-radius:2px;animation:cfFall linear forwards}
@keyframes cfFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* loading indicator */
#loading-screen{position:fixed;inset:0;z-index:500;background:var(--navy);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity .4s}
#loading-screen.hidden{opacity:0;pointer-events:none}
.spin-loader{width:28px;height:28px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}

@media(min-width:600px){
  .spinbtn{width:220px;height:66px}
  .spinbtn-in{font-size:27px}
}
</style>
</head>
<body>

<div class="bg-layer bg-grid"></div>
<div class="bg-layer bg-orb1"></div>
<div class="bg-layer bg-orb2"></div>

<!-- LOADING -->
<div id="loading-screen">
  <div class="logo-badge" style="margin-bottom:8px">
    <div class="logo-mark">subsidios<em style="color:var(--gold);font-style:normal">.cl</em></div>
    <div class="logo-sub">Feria Inmobiliaria</div>
  </div>
  <div class="spin-loader"></div>
  <span style="font-size:12px;color:var(--gray)">Cargando ruleta...</span>
</div>

<!-- ═══ GAME VIEW (PRINCIPAL) ═══ -->
<div id="game" class="view">
  <div class="header">
    <div class="logo-wrap">
      <div class="logo-badge">
        <div class="logo-mark">subsidios<em>.cl</em></div>
        <div class="logo-sub">Feria Inmobiliaria</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span id="conn-dot" style="font-size:11px;color:var(--gray)"></span>
      <button class="hbtn" onclick="openConfig()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
        Configurar
      </button>
    </div>
  </div>
  <div class="wheel-section">
    <div class="wframe" id="wframe">
      <div class="wring wring1"></div>
      <div class="wring wring2"></div>
      <div class="ptr"><div class="ptr-dot"></div><div class="ptr-tri"></div></div>
      <canvas id="wcanvas"></canvas>
      <div class="hub"><div class="hub-in"></div></div>
    </div>
    <button class="spinbtn" id="spinbtn" onclick="spinWheel()">
      <div class="spinbtn-in">
        <svg class="spin-ico" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
        GIRAR
      </div>
    </button>
  </div>
</div>

<!-- ═══ CONFIG DRAWER ═══ -->
<div id="cfg-overlay">
  <div class="cfg-backdrop" onclick="closeConfig()"></div>
  <div class="cfg-drawer">
    <div class="cfg-drawer-header">
      <span class="cfg-drawer-title">CONFIGURACIÓN</span>
      <button class="cfg-close" onclick="closeConfig()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="cfg-body">

      <div class="card">
        <div class="clabel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
          Cantidad de segmentos
        </div>
        <div class="srow">
          <label>Número de casillas</label>
          <input type="range" id="num-slots" min="4" max="12" step="1" value="8" oninput="onSlotsChange()">
          <span class="sval" id="slots-display">8</span>
        </div>
      </div>

      <div class="card">
        <div class="clabel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          Premios y probabilidades
        </div>
        <table class="stbl">
          <thead>
            <tr>
              <th style="width:12px"></th>
              <th style="width:46px">Foto</th>
              <th>Premio</th>
              <th style="width:52px" class="tc">%</th>
              <th style="width:40px" class="tc">Siga</th>
            </tr>
          </thead>
          <tbody id="seg-body"></tbody>
        </table>
        <div class="probrow">
          <span style="font-size:11px;color:var(--gray);font-weight:500">Total</span>
          <div class="probbar-wrap"><div class="probbar" id="probbar"></div></div>
          <span class="problbl" id="problbl">100%</span>
        </div>
      </div>

    </div>
    <div class="cfg-footer">
      <button class="savebtn" onclick="saveConfig()">GUARDAR CONFIGURACIÓN</button>
      <div class="save-status" id="save-status"></div>
    </div>
  </div>
</div>

<!-- ═══ RESULT OVERLAY ═══ -->
<div id="result">
  <div class="rbg" onclick="closeResult()"></div>
  <div class="rcard" id="rcard">
    <div id="rimg-wrap" style="display:none"></div>
    <div id="rburst" class="rburst"></div>
    <div id="reye" class="reye"></div>
    <div id="rprize" class="rprize"></div>
    <div class="rdiv"></div>
    <div class="racts">
      <button class="rbtn-again" onclick="closeResult()">¡OTRA VEZ!</button>
    </div>
  </div>
</div>

<script>
// ═══ SUPABASE ═══
const SB_URL='https://ulkqgeqlmtsvxneqofgf.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsa3FnZXFsbXRzdnhuZXFvZmdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4OTAxOTcsImV4cCI6MjA5NTQ2NjE5N30.4Kf0lXIHRb6BaFlV_MumLPwPdLyTow2Sf8NoTKiVU5o';
const HDRS={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};
const STORAGE_URL=SB_URL+'/storage/v1/object/public/premios/';

// ═══ PALETTE ═══
const PAL=['#1a4f8a','#c0392b','#1a6b3c','#8e44ad','#16a085','#d35400','#2563b0','#b7791f','#2c7a7b','#702459','#276749','#742a2a'];
const SIGA_COL='#2d3f58';

// ═══ STATE ═══
let segments=[];
let currentAngle=0;
let isSpinning=false;
let wheelSize=320;
let configId=null;
const imgCache={};

// ═══ SUPABASE HELPERS ═══
async function sbGet(t){
  const r=await fetch(SB_URL+'/rest/v1/'+t+'?select=*&limit=1',{headers:{...HDRS,'Range':'0-0'}});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function sbUpdate(t,id,d){
  const r=await fetch(SB_URL+'/rest/v1/'+t+'?id=eq.'+id,{method:'PATCH',headers:{...HDRS,'Prefer':'return=representation'},body:JSON.stringify(d)});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function sbInsert(t,d){
  const r=await fetch(SB_URL+'/rest/v1/'+t,{method:'POST',headers:{...HDRS,'Prefer':'return=representation'},body:JSON.stringify(d)});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function uploadImage(file,name){
  const ext=file.name.split('.').pop();
  const fname=name+'_'+Date.now()+'.'+ext;
  const r=await fetch(SB_URL+'/storage/v1/object/premios/'+fname,{
    method:'POST',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':file.type,'x-upsert':'true'},
    body:file
  });
  if(!r.ok)throw new Error(await r.text());
  return STORAGE_URL+fname;
}

// ═══ LOAD CONFIG ═══
async function loadConfig(){
  const dot=document.getElementById('conn-dot');
  try{
    const rows=await sbGet('ruleta_config');
    if(rows&&rows.length>0){
      const row=rows[0];
      configId=row.id;
      if(row.segments&&row.segments.length>0){
        segments=row.segments;
        const n=segments.length;
        document.getElementById('num-slots').value=n;
        document.getElementById('slots-display').textContent=n;
        renderTable();
        dot.textContent='● Conectado';
        dot.style.color='var(--green)';
        setTimeout(()=>{dot.textContent='';},4000);
        return;
      }
    }
    segments=defaultSegments(8);
    renderTable();
    dot.textContent='';
  }catch(e){
    segments=defaultSegments(8);
    renderTable();
    dot.textContent='Sin conexión';
    dot.style.color='var(--red)';
  }
}

// ═══ SAVE CONFIG ═══
async function saveConfig(){
  const btn=document.querySelector('.savebtn');
  const st=document.getElementById('save-status');
  btn.disabled=true;
  st.textContent='Guardando...';
  st.className='save-status';
  try{
    const toSave=segments.map(s=>({label:s.label,isSiga:s.isSiga,prob:s.prob,color:s.color,imgUrl:s.imgUrl||null}));
    if(configId){
      await sbUpdate('ruleta_config',configId,{segments:toSave,updated_at:new Date().toISOString()});
    }else{
      const rows=await sbInsert('ruleta_config',{segments:toSave});
      if(rows&&rows[0])configId=rows[0].id;
    }
    st.textContent='✓ Guardado correctamente';
    st.className='save-status ok';
    drawWheel();
  }catch(e){
    st.textContent='Error: '+e.message;
    st.className='save-status err';
  }finally{
    btn.disabled=false;
    setTimeout(()=>{st.textContent='';},4000);
  }
}

// ═══ SEGMENTS ═══
function defaultSegments(n){
  const defs=[
    {label:'🏠 Tour departamento',isSiga:false},{label:'☕ Café gratis',isSiga:false},
    {label:'🎁 Bolsa de regalo',isSiga:false},{label:'Siga participando',isSiga:true},
    {label:'🛍 Merchandising',isSiga:false},{label:'📋 Asesoría gratis',isSiga:false},
    {label:'Siga participando',isSiga:true},{label:'🏆 Premio mayor',isSiga:false},
    {label:'🎟 Sorteo especial',isSiga:false},{label:'Siga participando',isSiga:true},
    {label:'📱 Consulta online',isSiga:false},{label:'🍰 Postre gratis',isSiga:false},
  ];
  const base=Math.floor(100/n),extra=100-base*n;
  return Array.from({length:n},(_,i)=>({
    label:defs[i%defs.length].label,isSiga:defs[i%defs.length].isSiga,
    prob:base+(i===0?extra:0),
    color:defs[i%defs.length].isSiga?SIGA_COL:PAL[i%PAL.length],
    imgUrl:null
  }));
}

function onSlotsChange(){
  const n=+document.getElementById('num-slots').value;
  document.getElementById('slots-display').textContent=n;
  segments=defaultSegments(n);
  renderTable();
}

function renderTable(){
  const tbody=document.getElementById('seg-body');
  tbody.innerHTML='';
  segments.forEach((seg,i)=>{
    const hasImg=seg.imgUrl&&seg.imgUrl.length>0;
    const tr=document.createElement('tr');
    tr.className='srow2';
    tr.innerHTML=`
      <td><div class="cpill" style="background:${seg.color}"></div></td>
      <td>
        <div class="img-cell">
          ${hasImg
            ?`<img class="img-preview" src="${seg.imgUrl}" alt="" onclick="document.getElementById('fup-${i}').click()"/>`
            :`<div class="img-placeholder" onclick="document.getElementById('fup-${i}').click()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              </div>`}
          <input type="file" id="fup-${i}" accept="image/*" style="display:none" onchange="handleImg(${i},this)"/>
        </div>
      </td>
      <td><input class="sinput" type="text" value="${seg.label}" oninput="segments[${i}].label=this.value" placeholder="Premio..."/></td>
      <td><input class="sinput-n" type="number" value="${seg.prob}" min="0" max="100" oninput="segments[${i}].prob=parseInt(this.value)||0;updateProbBar()"/></td>
      <td><input type="checkbox" class="chk" ${seg.isSiga?'checked':''} onchange="toggleSiga(${i},this.checked)"/></td>
    `;
    tbody.appendChild(tr);
  });
  updateProbBar();
}

async function handleImg(idx,input){
  const file=input.files[0];
  if(!file)return;
  const st=document.getElementById('save-status');
  st.textContent='Subiendo imagen...';
  st.className='save-status';
  try{
    const url=await uploadImage(file,'premio_'+idx);
    segments[idx].imgUrl=url;
    renderTable();
    st.textContent='✓ Imagen subida';
    st.className='save-status ok';
    setTimeout(()=>{st.textContent='';},3000);
  }catch(e){
    st.textContent='Error al subir imagen';
    st.className='save-status err';
  }
}

function toggleSiga(i,checked){
  segments[i].isSiga=checked;
  segments[i].color=checked?SIGA_COL:PAL[i%PAL.length];
  const pill=document.querySelector(`#seg-body tr:nth-child(${i+1}) .cpill`);
  if(pill)pill.style.background=segments[i].color;
}

function updateProbBar(){
  const total=segments.reduce((s,x)=>s+x.prob,0);
  const bar=document.getElementById('probbar');
  const lbl=document.getElementById('problbl');
  bar.style.width=Math.min(total,100)+'%';
  const c=total===100?'var(--green)':total>100?'var(--red)':'var(--gold)';
  bar.style.background=c;lbl.textContent=total+'%';lbl.style.color=c;
}

// ═══ DRAWER ═══
function openConfig(){
  const ov=document.getElementById('cfg-overlay');
  ov.style.display='block';
  void ov.offsetWidth;
  ov.classList.add('open');
}
function closeConfig(){
  const ov=document.getElementById('cfg-overlay');
  ov.classList.remove('open');
  setTimeout(()=>{ov.style.display='none';},340);
  drawWheel();
}

// ═══ WHEEL SIZE ═══
function calcWheelSize(){
  const vw=window.innerWidth,vh=window.innerHeight;
  wheelSize=Math.max(Math.min(vw-40,vh-220,460),240);
}

// ═══ DRAW WHEEL ═══
function loadImg(url){
  if(imgCache[url])return Promise.resolve(imgCache[url]);
  return new Promise(res=>{
    const img=new Image();img.crossOrigin='anonymous';
    img.onload=()=>{imgCache[url]=img;res(img)};
    img.onerror=()=>res(null);img.src=url;
  });
}

async function drawWheel(){
  const canvas=document.getElementById('wcanvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const sz=wheelSize;
  canvas.width=sz;canvas.height=sz;
  const cx=sz/2,cy=sz/2,r=cx-2;
  ctx.clearRect(0,0,sz,sz);
  const total=segments.reduce((s,x)=>s+x.prob,0)||1;
  const n=segments.length;
  let angle=currentAngle-Math.PI/2;
  const imgs=await Promise.all(segments.map(s=>s.imgUrl?loadImg(s.imgUrl):Promise.resolve(null)));

  segments.forEach((seg,i)=>{
    const slice=(seg.prob/total)*2*Math.PI;
    const sliceDeg=(seg.prob/total)*360;

    // Fill
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,angle,angle+slice);ctx.closePath();
    ctx.fillStyle=seg.color;
    ctx.globalAlpha=i%2===1?0.85:1;ctx.fill();ctx.globalAlpha=1;

    // Edge highlight
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,angle,angle+slice);ctx.closePath();
    ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;ctx.stroke();

    // Separator
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(angle)*r,cy+Math.sin(angle)*r);
    ctx.strokeStyle='rgba(8,23,46,0.7)';ctx.lineWidth=2;ctx.stroke();

    // Content
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(angle+slice/2);
    const img=imgs[i];

    // Draw image thumbnail inside slice
    if(img&&!seg.isSiga&&sliceDeg>=22){
      const iSz=Math.min(sliceDeg<35?13:sliceDeg<50?17:20,20);
      const iX=r*0.72;
      ctx.save();
      ctx.beginPath();ctx.arc(iX,0,iSz,0,2*Math.PI);ctx.clip();
      ctx.drawImage(img,iX-iSz,-iSz,iSz*2,iSz*2);
      ctx.restore();
    }

    // Text
    ctx.rotate(Math.PI/2);
    ctx.shadowColor='rgba(0,0,0,0.55)';ctx.shadowBlur=3;
    ctx.fillStyle=seg.isSiga?'rgba(176,192,212,0.7)':'#fff';

    // Adaptive font size
    let fs=n<=6?13:n<=8?11:n<=10?9:7;
    if(sliceDeg<25)fs=Math.max(fs-2,6);
    ctx.font=`600 ${fs}px 'DM Sans',sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';

    // Parse label
    const emojiRx=/\p{Emoji_Presentation}|\p{Extended_Pictographic}/gu;
    const raw=seg.label.replace(emojiRx,'').trim()||seg.label;
    const emoji=seg.label.match(emojiRx)?.[0]||'';
    const words=raw.split(' ').filter(Boolean);
    const half=Math.ceil(words.length/2);
    let lines=words.length<=1?[raw]:[words.slice(0,half).join(' '),words.slice(half).join(' ')].filter(Boolean);

    // Truncate to fit slice width
    const maxTxtW=r*(sliceDeg<30?0.35:0.42);
    lines=lines.map(l=>{
      let s=l;
      while(s.length>3&&ctx.measureText(s+'…').width>maxTxtW)s=s.slice(0,-1);
      return s!==l?s+'…':s;
    });

    const lh=fs*1.3;
    const hasEmoji=emoji&&!seg.isSiga&&sliceDeg>=32&&!img;
    const hasImg=img&&!seg.isSiga&&sliceDeg>=22;
    const yOff=hasImg?2:0;
    const totalH=lines.length*lh;

    if(hasEmoji){
      const blockH=(fs+3)+totalH;
      let y=-blockH/2;
      ctx.font=`${fs+3}px serif`;ctx.fillText(emoji,0,y+fs/2+1);
      y+=fs+4;
      ctx.font=`600 ${fs}px 'DM Sans',sans-serif`;
      lines.forEach(l=>{ctx.fillText(l,0,y+lh/2);y+=lh;});
    }else{
      let y=yOff-totalH/2;
      lines.forEach(l=>{ctx.fillText(l,0,y+lh/2);y+=lh;});
    }

    ctx.shadowBlur=0;ctx.restore();
    angle+=slice;
  });

  // Center mask
  ctx.beginPath();ctx.arc(cx,cy,30,0,2*Math.PI);
  ctx.fillStyle='#08172e';ctx.fill();
}

// ═══ SPIN ═══
function spinWheel(){
  if(isSpinning)return;
  isSpinning=true;
  document.getElementById('spinbtn').disabled=true;
  const total=segments.reduce((s,x)=>s+x.prob,0)||1;
  let rand=Math.random()*total,winIdx=0,cum=0;
  for(let i=0;i<segments.length;i++){cum+=segments[i].prob;if(rand<cum){winIdx=i;break;}}
  const slices=segments.map(s=>(s.prob/total)*2*Math.PI);
  let sr=0;for(let i=0;i<winIdx;i++)sr+=slices[i];
  const mid=sr+slices[winIdx]/2;
  const desired=-Math.PI/2-mid;
  const fullSpins=(6+Math.floor(Math.random()*4))*2*Math.PI;
  const diff=((desired-currentAngle)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
  const target=currentAngle+fullSpins+diff;
  const dur=4500+Math.random()*1500;
  const t0=performance.now(),a0=currentAngle;
  function ease(t){return 1-Math.pow(1-t,4);}
  function tick(now){
    const p=Math.min((now-t0)/dur,1);
    currentAngle=a0+(target-a0)*ease(p);
    drawWheel();
    if(p<1){requestAnimationFrame(tick);}
    else{currentAngle=target;drawWheel();isSpinning=false;document.getElementById('spinbtn').disabled=false;setTimeout(()=>showResult(winIdx),350);}
  }
  requestAnimationFrame(tick);
}

// ═══ RESULT ═══
function showResult(idx){
  const seg=segments[idx];
  const card=document.getElementById('rcard');
  const imgWrap=document.getElementById('rimg-wrap');
  if(seg.imgUrl&&!seg.isSiga){
    imgWrap.className='rimg-wrap';
    imgWrap.innerHTML=`<img src="${seg.imgUrl}" alt="${seg.label}"/>`;
    imgWrap.style.display='block';
  }else{imgWrap.style.display='none';}
  if(seg.isSiga){
    document.getElementById('rburst').textContent='😊';
    document.getElementById('reye').textContent='Esta vez no fue';
    document.getElementById('reye').className='reye se';
    document.getElementById('rprize').textContent='SIGA PARTICIPANDO';
    document.getElementById('rprize').className='rprize st';
    card.classList.add('siga');
  }else{
    document.getElementById('rburst').textContent='🎉';
    document.getElementById('reye').textContent='¡Felicitaciones! Ganaste:';
    document.getElementById('reye').className='reye';
    document.getElementById('rprize').textContent=seg.label;
    document.getElementById('rprize').className='rprize';
    card.classList.remove('siga');
    launchConfetti();
  }
  const ov=document.getElementById('result');
  ov.style.display='flex';void ov.offsetWidth;ov.classList.add('show');
}

function closeResult(){
  const ov=document.getElementById('result');
  ov.style.display='none';ov.classList.remove('show');
}

function launchConfetti(){
  const cols=['#f5c518','#1a4f8a','#e53e3e','#38a169','#8e44ad','#fff'];
  for(let i=0;i<70;i++){
    const el=document.createElement('div');el.className='cfp';
    el.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${cols[Math.floor(Math.random()*cols.length)]};width:${5+Math.random()*8}px;height:${5+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.6}s;`;
    document.body.appendChild(el);el.addEventListener('animationend',()=>el.remove());
  }
}

window.addEventListener('resize',()=>{
  calcWheelSize();
  document.getElementById('wframe').style.setProperty('--ws',wheelSize+'px');
  drawWheel();
});

// ═══ BOOT ═══
async function boot(){
  calcWheelSize();
  document.getElementById('wframe').style.setProperty('--ws',wheelSize+'px');
  await loadConfig();
  await drawWheel();
  document.getElementById('game').classList.add('active');
  const ls=document.getElementById('loading-screen');
  ls.classList.add('hidden');
  setTimeout(()=>ls.remove(),500);
}
boot();
</script>
