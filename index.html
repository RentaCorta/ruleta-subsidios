<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Ruleta de Premios — subsidios.cl</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0B1E3D;
    --navy2: #122748;
    --blue: #1B4F8A;
    --blue-light: #2E6DB5;
    --gold: #F7C240;
    --gold2: #E5AE1A;
    --gold-dim: rgba(247,194,64,0.15);
    --white: #FFFFFF;
    --gray: #8A9BB5;
    --gray2: #C8D5E8;
    --siga: #4A5568;
    --danger: #E53E3E;
    --success: #38A169;
    --radius: 16px;
    --radius-sm: 10px;
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--white);
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(27,79,138,0.35) 0%, transparent 70%);
    top: -200px; right: -200px;
    pointer-events: none;
    z-index: 0;
  }

  .orb2 {
    position: fixed;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(247,194,64,0.08) 0%, transparent 70%);
    bottom: -100px; left: -100px;
    pointer-events: none;
    z-index: 0;
  }

  .view { display: none; position: fixed; inset: 0; overflow: hidden; z-index: 1; }
  .view.active { display: flex; flex-direction: column; }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    position: relative;
    z-index: 10;
    flex-shrink: 0;
  }

  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo-badge {
    background: linear-gradient(135deg, var(--blue) 0%, var(--blue-light) 100%);
    border: 1.5px solid rgba(247,194,64,0.4);
    border-radius: 10px;
    padding: 8px 14px;
  }
  .logo-wordmark { font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 17px; color: var(--white); letter-spacing: -0.3px; }
  .logo-wordmark span { color: var(--gold); }
  .logo-tagline { font-size: 10px; color: var(--gray); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }

  .header-btn {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--gray2);
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .header-btn:hover { background: rgba(255,255,255,0.1); color: var(--white); }
  .header-btn svg { width: 16px; height: 16px; stroke-width: 2; }

  #config-view { background: var(--navy); overflow-y: auto; -webkit-overflow-scrolling: touch; }

  .config-body { flex: 1; overflow-y: auto; padding: 0 28px 40px; display: flex; flex-direction: column; gap: 20px; }

  .config-hero { text-align: center; padding: 24px 0 8px; }
  .config-hero h1 {
    font-family: 'Bebas Neue', sans-serif; font-size: 52px; letter-spacing: 2px;
    background: linear-gradient(135deg, var(--white) 40%, var(--gold) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1;
  }
  .config-hero p { color: var(--gray); font-size: 14px; margin-top: 8px; font-weight: 400; }

  .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius); padding: 20px; backdrop-filter: blur(8px); }

  .card-title { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .card-title svg { width: 14px; height: 14px; stroke-width: 2.5; opacity: 0.8; }

  .slot-row { display: flex; align-items: center; gap: 16px; }
  .slot-row label { font-size: 14px; color: var(--gray2); flex: 1; font-weight: 400; }
  .slot-row input[type=range] { flex: 2; -webkit-appearance: none; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; outline: none; }
  .slot-row input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--gold); cursor: pointer; box-shadow: 0 0 12px rgba(247,194,64,0.5); }
  .slot-val { font-family: 'Space Mono', monospace; font-size: 20px; color: var(--gold); min-width: 32px; text-align: right; }

  .seg-table { width: 100%; border-collapse: collapse; }
  .seg-table th { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--gray); padding: 0 8px 10px; text-align: left; }
  .seg-table th:last-child, .seg-table th:nth-child(3) { text-align: center; }
  .seg-row td { padding: 5px 8px; vertical-align: middle; }
  .seg-row:not(:last-child) td { border-bottom: 1px solid rgba(255,255,255,0.04); padding-bottom: 8px; }

  .color-pill { width: 12px; height: 30px; border-radius: 6px; flex-shrink: 0; }

  .seg-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 8px 10px; transition: border-color 0.2s; -webkit-tap-highlight-color: transparent; }
  .seg-input:focus { outline: none; border-color: var(--gold); background: rgba(255,255,255,0.08); }
  .seg-input::placeholder { color: var(--gray); }

  .seg-input-num { width: 58px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: var(--gold); font-family: 'Space Mono', monospace; font-size: 13px; padding: 8px 6px; text-align: center; transition: border-color 0.2s; }
  .seg-input-num:focus { outline: none; border-color: var(--gold); }

  .checkbox-siga { width: 22px; height: 22px; -webkit-appearance: none; border: 2px solid rgba(255,255,255,0.2); border-radius: 6px; background: transparent; cursor: pointer; transition: all 0.2s; position: relative; display: block; margin: 0 auto; }
  .checkbox-siga:checked { background: var(--gold); border-color: var(--gold); }
  .checkbox-siga:checked::after { content: ''; position: absolute; left: 5px; top: 2px; width: 8px; height: 12px; border: 2px solid var(--navy); border-top: 0; border-left: 0; transform: rotate(45deg); }

  .prob-indicator { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.06); }
  .prob-bar-wrap { flex: 1; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin: 0 12px; }
  .prob-bar { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; }
  .prob-label { font-family: 'Space Mono', monospace; font-size: 12px; min-width: 52px; text-align: right; font-weight: 400; }

  .launch-wrap { padding: 0 28px 20px; flex-shrink: 0; }
  .launch-btn {
    width: 100%; padding: 20px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
    color: var(--navy); font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px;
    border: none; border-radius: var(--radius); cursor: pointer;
    position: relative; overflow: hidden; transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 24px rgba(247,194,64,0.3); -webkit-tap-highlight-color: transparent;
  }
  .launch-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 60%); }
  .launch-btn:active { transform: scale(0.98); box-shadow: 0 2px 12px rgba(247,194,64,0.3); }

  #game-view { background: var(--navy); justify-content: space-between; align-items: center; }

  .wheel-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 20px; gap: 28px; width: 100%; }

  .wheel-frame { position: relative; display: flex; align-items: center; justify-content: center; }

  .wheel-ring { position: absolute; border-radius: 50%; pointer-events: none; }
  .ring-1 {
    width: calc(var(--wsize) + 28px); height: calc(var(--wsize) + 28px);
    background: conic-gradient(from 0deg, var(--gold) 0deg 30deg, var(--navy2) 30deg 90deg, var(--gold) 90deg 120deg, var(--navy2) 120deg 180deg, var(--gold) 180deg 210deg, var(--navy2) 210deg 270deg, var(--gold) 270deg 300deg, var(--navy2) 300deg 360deg);
    box-shadow: 0 0 40px rgba(247,194,64,0.25), inset 0 0 20px rgba(247,194,64,0.1);
  }
  .ring-2 { width: calc(var(--wsize) + 10px); height: calc(var(--wsize) + 10px); background: var(--navy); }

  #wheel-canvas { border-radius: 50%; position: relative; z-index: 2; display: block; }

  .pointer-wrap { position: absolute; top: -4px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; flex-direction: column; align-items: center; }
  .pointer-circle { width: 24px; height: 24px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 16px rgba(247,194,64,0.7); border: 3px solid var(--navy); }
  .pointer-arrow { width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 22px solid var(--gold); filter: drop-shadow(0 4px 8px rgba(247,194,64,0.4)); margin-top: -2px; }

  .hub { position: absolute; width: 64px; height: 64px; border-radius: 50%; background: var(--navy); border: 4px solid var(--gold); z-index: 10; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(247,194,64,0.3); }
  .hub-inner { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%); }

  .spin-btn { position: relative; padding: 0; width: 200px; height: 64px; border: none; cursor: pointer; background: transparent; -webkit-tap-highlight-color: transparent; transition: transform 0.1s; }
  .spin-btn:active:not(:disabled) { transform: scale(0.97); }
  .spin-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .spin-btn-inner {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
    border-radius: 32px; display: flex; align-items: center; justify-content: center; gap: 10px;
    font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: var(--navy);
    box-shadow: 0 6px 0 #a87a00, 0 8px 24px rgba(247,194,64,0.4);
    transition: box-shadow 0.1s, transform 0.1s; position: relative; overflow: hidden;
  }
  .spin-btn-inner::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.25) 0%, transparent 50%); }
  .spin-btn:active:not(:disabled) .spin-btn-inner { box-shadow: 0 2px 0 #a87a00, 0 4px 12px rgba(247,194,64,0.3); transform: translateY(4px); }

  .spin-icon { width: 22px; height: 22px; stroke: var(--navy); stroke-width: 2.5; fill: none; }

  #result-overlay { display: none; position: fixed; inset: 0; z-index: 200; align-items: center; justify-content: center; padding: 24px; }
  #result-overlay.show { display: flex; }

  .result-backdrop { position: absolute; inset: 0; background: rgba(11,30,61,0.92); backdrop-filter: blur(12px); }

  .result-card {
    position: relative; z-index: 1; width: 100%; max-width: 400px;
    background: var(--navy2); border: 1px solid rgba(247,194,64,0.25); border-radius: 24px;
    padding: 36px 28px 28px; text-align: center;
    animation: resultIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .result-card.siga-card { border-color: rgba(255,255,255,0.1); }

  @keyframes resultIn { from { transform: scale(0.7) translateY(40px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

  .result-burst { font-size: 60px; line-height: 1; margin-bottom: 16px; animation: burst 0.5s 0.2s both; }
  @keyframes burst { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .result-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
  .result-eyebrow.siga-eye { color: var(--gray); }

  .result-prize { font-family: 'Bebas Neue', sans-serif; font-size: 38px; letter-spacing: 1px; color: var(--white); line-height: 1.1; margin-bottom: 28px; }
  .result-prize.siga-txt { font-size: 32px; color: var(--gray2); }

  .result-divider { height: 1px; background: rgba(255,255,255,0.08); margin-bottom: 20px; }

  .result-actions { display: flex; flex-direction: column; gap: 10px; }

  .btn-again { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%); color: var(--navy); font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1.5px; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 16px rgba(247,194,64,0.3); -webkit-tap-highlight-color: transparent; transition: transform 0.1s; }
  .btn-again:active { transform: scale(0.98); }

  .btn-config { width: 100%; padding: 14px; background: transparent; color: var(--gray); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: border-color 0.2s, color 0.2s; }
  .btn-config:hover { border-color: rgba(255,255,255,0.2); color: var(--white); }

  .confetti-particle { position: fixed; width: 8px; height: 8px; border-radius: 2px; pointer-events: none; z-index: 300; animation: confettiFall linear forwards; }
  @keyframes confettiFall { 0% { transform: translateY(-20px) rotate(0deg) scale(1); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg) scale(0.5); opacity: 0; } }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  @media (min-width: 600px) {
    .config-hero h1 { font-size: 64px; }
    .launch-btn { font-size: 28px; }
    .spin-btn { width: 240px; height: 72px; }
    .spin-btn-inner { font-size: 30px; }
  }
</style>
</head>
<body>

<div class="orb2"></div>

<div id="config-view" class="view active">
  <div class="header">
    <a class="logo" href="#">
      <div class="logo-badge">
        <div class="logo-wordmark">subsidios<span>.cl</span></div>
        <div class="logo-tagline">Feria Inmobiliaria</div>
      </div>
    </a>
  </div>
  <div class="config-body">
    <div class="config-hero">
      <h1>RULETA<br>DE PREMIOS</h1>
      <p>Configura los segmentos, premios y probabilidades</p>
    </div>
    <div class="card">
      <div class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        Cantidad de segmentos
      </div>
      <div class="slot-row">
        <label>Número de casillas</label>
        <input type="range" id="num-slots" min="4" max="12" step="1" value="8" oninput="onSlotsChange()">
        <span class="slot-val" id="slots-display">8</span>
      </div>
    </div>
    <div class="card">
      <div class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        Premios y probabilidades
      </div>
      <table class="seg-table">
        <thead>
          <tr>
            <th style="width:16px"></th>
            <th>Premio</th>
            <th style="width:62px">%</th>
            <th style="width:48px; text-align:center">Siga</th>
          </tr>
        </thead>
        <tbody id="segments-body"></tbody>
      </table>
      <div class="prob-indicator">
        <span style="font-size:12px; color:var(--gray); font-weight:500">Probabilidad total</span>
        <div class="prob-bar-wrap"><div class="prob-bar" id="prob-bar"></div></div>
        <span class="prob-label" id="prob-label">100%</span>
      </div>
    </div>
  </div>
  <div class="launch-wrap">
    <button class="launch-btn" onclick="startGame()">▶ LANZAR RULETA</button>
  </div>
</div>

<div id="game-view" class="view">
  <div class="header">
    <a class="logo" href="#">
      <div class="logo-badge">
        <div class="logo-wordmark">subsidios<span>.cl</span></div>
        <div class="logo-tagline">Feria Inmobiliaria</div>
      </div>
    </a>
    <button class="header-btn" onclick="goConfig()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
      Configurar
    </button>
  </div>
  <div class="wheel-section">
    <div class="wheel-frame" id="wheel-frame">
      <div class="wheel-ring ring-1"></div>
      <div class="wheel-ring ring-2"></div>
      <div class="pointer-wrap">
        <div class="pointer-circle"></div>
        <div class="pointer-arrow"></div>
      </div>
      <canvas id="wheel-canvas"></canvas>
      <div class="hub"><div class="hub-inner"></div></div>
    </div>
    <button class="spin-btn" id="spin-btn" onclick="spinWheel()">
      <div class="spin-btn-inner">
        <svg class="spin-icon" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
        GIRAR
      </div>
    </button>
  </div>
</div>

<div id="result-overlay">
  <div class="result-backdrop" onclick="closeResult(false)"></div>
  <div class="result-card" id="result-card">
    <div class="result-burst" id="result-burst"></div>
    <div class="result-eyebrow" id="result-eyebrow"></div>
    <div class="result-prize" id="result-prize"></div>
    <div class="result-divider"></div>
    <div class="result-actions">
      <button class="btn-again" onclick="closeResult(true)">¡OTRA VEZ!</button>
      <button class="btn-config" onclick="closeResult(false)">Volver a configurar</button>
    </div>
  </div>
</div>

<script>
const PALETTE = ['#1B4F8A','#F7C240','#2E86C1','#E67E22','#1A6B3C','#8E44AD','#C0392B','#16A085','#D35400','#2C3E50','#27AE60','#E91E8C'];
const SIGA_COLOR = '#3D4F6B';

let segments = [];
let currentAngle = 0;
let isSpinning = false;
let wheelSize = 340;

function calcWheelSize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const maxW = Math.min(vw - 56, 440);
  const maxH = vh - 280;
  wheelSize = Math.min(maxW, maxH, 440);
  wheelSize = Math.max(wheelSize, 260);
}

function defaultSegments(n) {
  const defs = [
    {label:'🏠 Tour departamento', isSiga:false},
    {label:'☕ Café gratis', isSiga:false},
    {label:'🎁 Bolsa de regalo', isSiga:false},
    {label:'Siga participando', isSiga:true},
    {label:'🛍 Merchandising', isSiga:false},
    {label:'📋 Asesoría gratis', isSiga:false},
    {label:'Siga participando', isSiga:true},
    {label:'🏆 Premio mayor', isSiga:false},
    {label:'🎟 Sorteo especial', isSiga:false},
    {label:'Siga participando', isSiga:true},
    {label:'📱 Consulta online', isSiga:false},
    {label:'🍰 Postre gratis', isSiga:false},
  ];
  const base = Math.floor(100/n);
  const extra = 100 - base*n;
  return Array.from({length:n},(_,i)=>({
    label: defs[i%defs.length].label,
    isSiga: defs[i%defs.length].isSiga,
    prob: base + (i===0?extra:0),
    color: defs[i%defs.length].isSiga ? SIGA_COLOR : PALETTE[i%PALETTE.length]
  }));
}

function onSlotsChange() {
  const n = +document.getElementById('num-slots').value;
  document.getElementById('slots-display').textContent = n;
  segments = defaultSegments(n);
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('segments-body');
  tbody.innerHTML = '';
  segments.forEach((seg,i) => {
    const tr = document.createElement('tr');
    tr.className = 'seg-row';
    tr.innerHTML = `
      <td><div class="color-pill" style="background:${seg.color}"></div></td>
      <td><input class="seg-input" type="text" value="${seg.label}" oninput="segments[${i}].label=this.value;drawWheel()" placeholder="Premio..."/></td>
      <td><input class="seg-input-num" type="number" value="${seg.prob}" min="0" max="100" oninput="segments[${i}].prob=parseInt(this.value)||0;updateProbBar()"/></td>
      <td><input type="checkbox" class="checkbox-siga" ${seg.isSiga?'checked':''}
        onchange="segments[${i}].isSiga=this.checked;segments[${i}].color=this.checked?'${SIGA_COLOR}':PALETTE[${i}%PALETTE.length];document.querySelector('#segments-body tr:nth-child(${i+1}) .color-pill').style.background=segments[${i}].color;drawWheel()"/></td>
    `;
    tbody.appendChild(tr);
  });
  updateProbBar();
}

function updateProbBar() {
  const total = segments.reduce((s,x)=>s+x.prob,0);
  const pct = Math.min(total,100);
  const bar = document.getElementById('prob-bar');
  const lbl = document.getElementById('prob-label');
  bar.style.width = pct+'%';
  bar.style.background = total===100 ? '#38A169' : total>100 ? '#E53E3E' : '#F7C240';
  lbl.textContent = total+'%';
  lbl.style.color = total===100 ? '#38A169' : total>100 ? '#E53E3E' : '#F7C240';
}

function drawWheel() {
  const canvas = document.getElementById('wheel-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const size = wheelSize;
  canvas.width = size;
  canvas.height = size;
  const cx = size/2, cy = size/2, r = cx - 2;
  ctx.clearRect(0,0,size,size);

  const total = segments.reduce((s,x)=>s+x.prob,0)||1;
  let angle = currentAngle - Math.PI/2;

  segments.forEach((seg,i) => {
    const slice = (seg.prob/total)*2*Math.PI;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,angle,angle+slice);
    ctx.closePath();
    ctx.fillStyle = seg.color;
    ctx.globalAlpha = i%2===1 ? 0.88 : 1;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(angle)*r, cy+Math.sin(angle)*r);
    ctx.strokeStyle = 'rgba(11,30,61,0.7)';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(angle+slice/2);
    ctx.translate(r*0.64,0);
    ctx.rotate(Math.PI/2);
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 4;
    ctx.fillStyle = seg.isSiga ? 'rgba(200,213,232,0.8)' : '#FFFFFF';
    const sliceDeg = (seg.prob/total)*360;
    const fs = sliceDeg < 25 ? 9 : sliceDeg < 40 ? 11 : 13;
    ctx.font = `600 ${fs}px 'DM Sans', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const raw = seg.label.replace(/\p{Emoji_Presentation}/gu,'').trim() || seg.label;
    const emoji = seg.label.match(/\p{Emoji_Presentation}/gu)?.[0]||'';
    const words = raw.split(' ');
    const half = Math.ceil(words.length/2);
    const line1 = words.slice(0,half).join(' ');
    const line2 = words.slice(half).join(' ');
    if(emoji && sliceDeg >= 35) {
      ctx.font = `${fs+2}px 'DM Sans'`;
      ctx.fillText(emoji, 0, line2 ? -18 : -12);
      ctx.font = `600 ${fs}px 'DM Sans', sans-serif`;
      ctx.fillText(line1, 0, line2 ? -4 : 4);
      if(line2) ctx.fillText(line2, 0, 10);
    } else if(line2 && sliceDeg >= 30) {
      ctx.fillText(line1, 0, -7);
      ctx.fillText(line2, 0, 7);
    } else {
      ctx.fillText(words.slice(0,3).join(' '), 0, 0);
    }
    ctx.shadowBlur = 0;
    ctx.restore();
    angle += slice;
  });

  ctx.beginPath();
  ctx.arc(cx,cy,34,0,2*Math.PI);
  ctx.fillStyle = '#0B1E3D';
  ctx.fill();
}

function spinWheel() {
  if(isSpinning) return;
  isSpinning = true;
  document.getElementById('spin-btn').disabled = true;

  const total = segments.reduce((s,x)=>s+x.prob,0)||1;
  let rand = Math.random()*total;
  let winIdx = 0, cum = 0;
  for(let i=0;i<segments.length;i++){
    cum += segments[i].prob;
    if(rand < cum){ winIdx = i; break; }
  }

  const sliceSizes = segments.map(s=>(s.prob/total)*2*Math.PI);
  let startRad = 0;
  for(let i=0;i<winIdx;i++) startRad += sliceSizes[i];
  const midRad = startRad + sliceSizes[winIdx]/2;
  const desiredAngle = -Math.PI/2 - midRad;
  const fullSpins = (6 + Math.floor(Math.random()*4)) * 2 * Math.PI;
  const diff = ((desiredAngle - currentAngle) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
  const targetAngle = currentAngle + fullSpins + diff;

  const duration = 4500 + Math.random()*1500;
  const startTime = performance.now();
  const startAngle = currentAngle;

  function easeOut(t) { return 1 - Math.pow(1-t, 4); }

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed/duration, 1);
    currentAngle = startAngle + (targetAngle-startAngle)*easeOut(progress);
    drawWheel();
    if(progress < 1) {
      requestAnimationFrame(animate);
    } else {
      currentAngle = targetAngle;
      drawWheel();
      isSpinning = false;
      document.getElementById('spin-btn').disabled = false;
      setTimeout(()=>showResult(winIdx), 300);
    }
  }
  requestAnimationFrame(animate);
}

function showResult(idx) {
  const seg = segments[idx];
  const overlay = document.getElementById('result-overlay');
  const card = document.getElementById('result-card');
  if(seg.isSiga) {
    document.getElementById('result-burst').textContent = '😊';
    document.getElementById('result-eyebrow').textContent = 'Esta vez no fue';
    document.getElementById('result-eyebrow').className = 'result-eyebrow siga-eye';
    document.getElementById('result-prize').textContent = 'SIGA PARTICIPANDO';
    document.getElementById('result-prize').className = 'result-prize siga-txt';
    card.classList.add('siga-card');
  } else {
    document.getElementById('result-burst').textContent = '🎉';
    document.getElementById('result-eyebrow').textContent = '¡Felicitaciones! Ganaste:';
    document.getElementById('result-eyebrow').className = 'result-eyebrow';
    document.getElementById('result-prize').textContent = seg.label;
    document.getElementById('result-prize').className = 'result-prize';
    card.classList.remove('siga-card');
    launchConfetti();
  }
  overlay.style.display = 'flex';
  void overlay.offsetWidth;
  overlay.classList.add('show');
}

function closeResult(again) {
  const overlay = document.getElementById('result-overlay');
  overlay.style.display = 'none';
  overlay.classList.remove('show');
  if(!again) goConfig();
}

function launchConfetti() {
  const colors = ['#F7C240','#1B4F8A','#E53E3E','#38A169','#8E44AD','#fff'];
  for(let i=0;i<60;i++){
    const el = document.createElement('div');
    el.className = 'confetti-particle';
    el.style.cssText = `left:${Math.random()*100}vw;top:-10px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;`;
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
}

function startGame() {
  calcWheelSize();
  const frame = document.getElementById('wheel-frame');
  frame.style.setProperty('--wsize', wheelSize+'px');
  document.getElementById('config-view').classList.remove('active');
  document.getElementById('game-view').classList.add('active');
  setTimeout(drawWheel, 50);
}

function goConfig() {
  document.getElementById('game-view').classList.remove('active');
  document.getElementById('config-view').classList.add('active');
}

window.addEventListener('resize', () => {
  if(document.getElementById('game-view').classList.contains('active')) {
    calcWheelSize();
    document.getElementById('wheel-frame').style.setProperty('--wsize', wheelSize+'px');
    drawWheel();
  }
});

calcWheelSize();
segments = defaultSegments(8);
renderTable();
</script>
